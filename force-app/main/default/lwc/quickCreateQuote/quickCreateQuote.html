<template>
	<div class="slds-p-around_medium">
		<lightning-record-picker
			label="Insurance Provider"
			placeholder="Search Insurance Providers..."
			object-api-name="Account"
			matching-info={providerMatchingInfo}
			display-info={providerDisplayInfo}
			filter={providerFilter}
			required
			onchange={handleProviderChange}
		></lightning-record-picker>

		<lightning-input
			label="Policy Number"
			type="text"
			value={policyNumber}
			onchange={handlePolicyNumberChange}
			class="slds-m-top_small"
		></lightning-input>

		<lightning-input
			label="Plan Name"
			type="text"
			value={planName}
			onchange={handlePlanNameChange}
			class="slds-m-top_small"
		></lightning-input>

		<lightning-input
			label="Proposed Premium"
			type="number"
			step="0.01"
			value={proposedPremium}
			onchange={handlePremiumChange}
			formatter="currency"
			required
			class="slds-m-top_small"
		></lightning-input>

		<lightning-input
			label="Coverage Amount"
			type="number"
			step="0.01"
			value={coverageAmount}
			onchange={handleCoverageChange}
			formatter="currency"
			class="slds-m-top_small"
		></lightning-input>

		<lightning-input
			label="Deductible"
			type="number"
			step="0.01"
			value={deductible}
			onchange={handleDeductibleChange}
			formatter="currency"
			class="slds-m-top_small"
		></lightning-input>

		<lightning-combobox
			label="Payment Frequency"
			value={paymentFrequency}
			placeholder="Select payment frequency..."
			options={paymentFrequencyOptions}
			onchange={handlePaymentFrequencyChange}
			class="slds-m-top_small"
		></lightning-combobox>

		<lightning-combobox
			label="Payment Method"
			value={paymentMethod}
			placeholder="Select payment method..."
			options={paymentMethodOptions}
			onchange={handlePaymentMethodChange}
			class="slds-m-top_small"
		></lightning-combobox>

		<lightning-input
			label="Proposed Start Date"
			type="date"
			value={proposedStartDate}
			onchange={handleStartDateChange}
			required
			class="slds-m-top_small"
		></lightning-input>

		<lightning-input
			label="Proposed Term (months)"
			type="number"
			step="1"
			min="1"
			value={proposedTerm}
			onchange={handleTermChange}
			required
			class="slds-m-top_small"
		></lightning-input>

		<lightning-textarea
			label="Description"
			value={description}
			onchange={handleDescriptionChange}
			class="slds-m-top_small"
		></lightning-textarea>

		<template if:true={errorMessage}>
			<div class="slds-text-color_error slds-m-top_small">
				{errorMessage}
			</div>
		</template>
	</div>

	<footer class="slds-modal__footer slds-clearfix">
		<lightning-button
			label="Cancel"
			onclick={handleCancel}
			class="slds-m-right_x-small"
		></lightning-button>
		<lightning-button
			label={submitLabel}
			variant="brand"
			onclick={handleSubmit}
			disabled={isSubmitDisabled}
		></lightning-button>
	</footer>
</template>
